name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - '**/Cargo.toml'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1). Empty = crates/vale-cli/Cargo.toml'
        required: false
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      prerelease: ${{ steps.plan.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: plan
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -E '^version[[:space:]]*=' crates/vale-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == 0.0.* ]] || [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Planned release: ${TAG}"

  build:
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
            bin_name: vale
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar
            bin_name: vale
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar
            bin_name: vale
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_name: vale.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p vale-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar'
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          TARGET="${{ matrix.target }}"
          PKG="vale-${VERSION}-${TARGET}"
          mkdir -p "dist/${PKG}"
          cp "target/${TARGET}/release/${{ matrix.bin_name }}" "dist/${PKG}/vale"
          chmod +x "dist/${PKG}/vale"
          tar -czvf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          echo "ASSET_PATH=dist/${PKG}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${PKG}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.plan.outputs.version }}"
          $TARGET = "${{ matrix.target }}"
          $PKG = "vale-$VERSION-$TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$PKG" | Out-Null
          Copy-Item "target/$TARGET/release/${{ matrix.bin_name }}" "dist/$PKG/vale.exe"
          Compress-Archive -Path "dist/$PKG" -DestinationPath "dist/$PKG.zip" -Force
          echo "ASSET_PATH=dist/$PKG.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$PKG.zip" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}

  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: Vale ${{ needs.plan.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/**
          draft: false
          prerelease: ${{ needs.plan.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.plan.outputs.prerelease != 'true' }}
